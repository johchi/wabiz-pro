app = "wabiz-backend"
primary_region = "jnb"

[build]
  [build.args]
    NODE_ENV = "production"

[env]
  PORT = "5000"

[[services]]
  internal_port = 5000
  protocol = "tcp"
  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
